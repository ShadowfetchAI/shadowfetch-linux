set timeout=10
set default=0

# Visual defaults — picked up by grub-mkrescue's stock theme.
set menu_color_normal=white/black
set menu_color_highlight=black/light-magenta

insmod all_video
insmod gfxterm
terminal_output gfxterm

menuentry "Shadowfetch Linux 1.0 (live)" --class linux {
    linux  /live/vmlinuz boot=live components username=shadow hostname=shadowfetch quiet splash
    initrd /live/initrd.img
}

menuentry "Shadowfetch Linux 1.0 (live, safe graphics)" --class linux {
    linux  /live/vmlinuz boot=live components username=shadow hostname=shadowfetch nomodeset
    initrd /live/initrd.img
}

menuentry "Shadowfetch Linux 1.0 (live, verbose)" --class linux {
    linux  /live/vmlinuz boot=live components username=shadow hostname=shadowfetch
    initrd /live/initrd.img
}

menuentry "Shadowfetch Linux 1.0 (live, debug shell)" --class linux {
    linux  /live/vmlinuz boot=live components username=shadow hostname=shadowfetch break=top
    initrd /live/initrd.img
}
